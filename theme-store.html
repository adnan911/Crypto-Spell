<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #142143;
    --gold: #ffaf00;
    --gold-light: #ffd166;
    --silver: #e4e4e4;
    --blue: #1a5d94;
    --blue-mid: #11225b;
    --bg: #0d1a35;
    --glow-gold: rgba(255,175,0,0.35);
    --glow-blue: rgba(26,93,148,0.5);
    --dim: rgba(228,228,228,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }
  .scene {
    position: relative;
    width: 390px;
    min-height: 100vh;
    overflow: hidden;
    background: linear-gradient(168deg, #0a1628 0%, #0d1a35 40%, #111e40 70%, #0b1830 100%);
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(26,93,148,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,93,148,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 100%);
    pointer-events: none;
  }
  .orb-1 {
    position: absolute; top: -40px; right: -60px;
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,175,0,0.18) 0%, transparent 70%);
    pointer-events: none; animation: orb-pulse 5s ease-in-out infinite alternate;
  }
  .orb-2 {
    position: absolute; bottom: 30%; left: -80px;
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, rgba(26,93,148,0.28) 0%, transparent 70%);
    pointer-events: none; animation: orb-pulse 7s ease-in-out infinite alternate-reverse;
  }
  @keyframes orb-pulse {
    from { transform: scale(1); opacity:0.8; }
    to { transform: scale(1.12); opacity:1; }
  }
  .content { position: relative; z-index:10; padding: 0 0 100px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 52px 22px 18px;
  }
  .header-back {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .header-back svg { width:16px; height:16px; stroke: var(--silver); }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 800; letter-spacing: 3px;
    text-transform: uppercase; color: var(--silver);
  }
  .credits-badge {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #1a3a6e, #142143);
    border: 1px solid rgba(255,175,0,0.4); border-radius: 20px;
    padding: 6px 14px 6px 8px;
    box-shadow: 0 0 14px rgba(255,175,0,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .credits-badge span {
    font-family: 'Barlow Condensed', sans-serif; font-size: 17px;
    font-weight: 700; color: var(--gold); letter-spacing: 1px;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 0; margin: 0 18px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 4px; overflow: hidden;
  }
  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 10px 0; border-radius: 10px; cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--dim); transition: all 0.25s;
  }
  .tab svg { width: 15px; height: 15px; }
  .tab.active {
    background: linear-gradient(135deg, var(--blue) 0%, #0e3a60 100%);
    color: #fff; box-shadow: 0 0 16px rgba(26,93,148,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1px solid rgba(26,93,148,0.6);
  }
  .tab.active svg { stroke: #fff; }

  /* EQUIPPED CARD */
  .equipped-card {
    margin: 0 18px 14px;
    background: linear-gradient(135deg, rgba(26,93,148,0.4), rgba(17,34,91,0.6));
    border: 1.5px solid var(--blue);
    border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    position: relative; overflow: hidden;
    box-shadow: 0 0 24px rgba(26,93,148,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: slide-up 0.4s 0.1s both;
  }
  .equipped-card::before {
    content: ''; position: absolute; top:0; left:0; right:0; height:1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--blue), transparent);
    opacity: 0.7;
  }
  .equipped-icon {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a3070, #0d1a45);
    border: 1px solid rgba(26,93,148,0.5);
    box-shadow: 0 4px 14px rgba(26,93,148,0.3);
  }
  .equipped-name {
    font-family: 'Barlow Condensed', sans-serif; font-size: 18px;
    font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; flex:1;
  }
  .equipped-badge {
    display: flex; align-items: center; gap: 5px;
    background: linear-gradient(135deg, rgba(255,175,0,0.2), rgba(255,175,0,0.08));
    border: 1px solid rgba(255,175,0,0.5); border-radius: 20px;
    padding: 5px 12px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
    box-shadow: 0 0 10px rgba(255,175,0,0.2);
  }
  .equipped-badge svg { width:12px; height:12px; stroke: var(--gold); }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
    font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,175,0,0.6); padding: 6px 22px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,175,0,0.2), transparent);
  }

  /* STORE ITEMS */
  .store-list { display: flex; flex-direction: column; gap: 10px; padding: 0 18px; }

  .store-item {
    position: relative; border-radius: 14px; overflow: hidden;
    cursor: pointer; transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    animation: slide-up 0.4s both;
  }
  .store-item:hover { transform: translateY(-2px); }

  .store-item-inner {
    position: relative;
    background: linear-gradient(135deg, rgba(20,33,67,0.9), rgba(14,24,50,0.95));
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* Blurred theme preview behind item */
  .theme-preview {
    position: absolute; inset: 0; opacity: 0.12;
    background-size: cover; background-position: center;
    filter: blur(8px); border-radius: 14px;
  }

  .item-icon {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
  }

  .item-body { flex: 1; min-width: 0; position: relative; z-index: 2; }
  .item-name {
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
    font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(228,228,228,0.6);
  }
  .item-sub {
    font-family: 'Exo 2', sans-serif; font-size: 10px;
    color: rgba(228,228,228,0.28); letter-spacing: 0.5px; margin-top: 2px;
  }

  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; position: relative; z-index: 2; }
  .item-price {
    display: flex; align-items: center; gap: 4px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
    font-weight: 700; color: var(--gold); letter-spacing: 0.5px;
  }
  .item-price svg { width: 12px; height: 12px; }
  .lock-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 5px 10px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(228,228,228,0.35); cursor: not-allowed;
  }
  .lock-btn svg { width: 10px; height: 10px; stroke: rgba(228,228,228,0.3); }

  /* NFT items */
  .nft-item .store-item-inner {
    border-color: rgba(255,175,0,0.12);
    background: linear-gradient(135deg, rgba(20,30,60,0.95), rgba(15,22,48,0.98));
  }
  .nft-badge {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    width: 100%;
  }
  .nft-badge-inner {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 12px;
    font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,175,0,0.55);
  }
  .nft-badge-inner svg { width: 16px; height: 16px; stroke: rgba(255,175,0,0.5); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 390px;
    background: linear-gradient(180deg, rgba(10,18,40,0) 0%, rgba(8,14,30,0.97) 30%);
    backdrop-filter: blur(20px); padding: 12px 0 28px;
    display: flex; justify-content: space-around; align-items: center;
    z-index: 100; border-top: 1px solid rgba(255,255,255,0.05);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; opacity: 0.45; padding: 6px 14px; border-radius: 12px; transition: opacity 0.2s;
  }
  .nav-item:hover { opacity: 0.8; }
  .nav-item.active { opacity: 1; }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-center {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--gold) 0%, #f09000 100%);
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(255,175,0,0.5), 0 4px 16px rgba(0,0,0,0.4);
    transform: translateY(-8px); cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2); opacity: 1 !important;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .nav-center:hover { transform: translateY(-10px); box-shadow: 0 0 28px rgba(255,175,0,0.65), 0 4px 20px rgba(0,0,0,0.4); }

  @keyframes slide-up {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }
  .d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.18s; } .d4 { animation-delay: 0.24s; }
  .d5 { animation-delay: 0.30s; } .d6 { animation-delay: 0.36s; }
  .d7 { animation-delay: 0.42s; } .d8 { animation-delay: 0.48s; }
</style>
</head>
<body>
<div class="scene">
  <div class="bg-grid"></div>
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="content">

    <!-- HEADER -->
    <div class="header" style="animation: slide-up 0.4s both;">
      <div class="header-back">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="header-title">The Store</span>
      <div class="credits-badge">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <defs>
            <radialGradient id="cg" cx="38%" cy="30%" r="65%">
              <stop offset="0%" stop-color="#ffe066"/><stop offset="55%" stop-color="#ffaf00"/><stop offset="100%" stop-color="#b87000"/>
            </radialGradient>
          </defs>
          <ellipse cx="11" cy="13" rx="8" ry="3" fill="#7a4800" opacity="0.6"/>
          <circle cx="11" cy="10" r="8" fill="url(#cg)"/>
          <circle cx="11" cy="10" r="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
          <ellipse cx="9" cy="8" rx="2" ry="1" fill="rgba(255,255,255,0.3)" transform="rotate(-30,9,8)"/>
        </svg>
        <span>100</span>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="animation: slide-up 0.4s 0.06s both;">
      <div class="tab active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        Themes
      </div>
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Keys
      </div>
    </div>

    <!-- EQUIPPED -->
    <div class="equipped-card">
      <div class="equipped-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="eqG" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#1a5d94"/><stop offset="100%" stop-color="#142143"/>
            </linearGradient>
          </defs>
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#eqG)"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1a5d94" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="equipped-name">Cosmic Blue</div>
      <div class="equipped-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Equipped
      </div>
    </div>

    <!-- STORE LIST -->
    <div class="section-label">Available Themes</div>
    <div class="store-list">

      <!-- Bitcoin Maximal -->
      <div class="store-item d1">
        <div class="store-item-inner">
          <div class="theme-preview" style="background: linear-gradient(135deg, #f7931a, #1a1a1a, #f7931a);"></div>
          <div class="item-icon" style="background:linear-gradient(135deg,#3a2000,#1e1000);border:1px solid rgba(247,147,26,0.3);box-shadow:0 4px 14px rgba(247,147,26,0.2);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" fill="#f7931a" opacity="0.15"/>
              <text x="12" y="16" text-anchor="middle" font-size="13" font-weight="900" font-family="serif" fill="#f7931a">₿</text>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">Bitcoin Maximal</div>
            <div class="item-sub">Orange pill aesthetic</div>
          </div>
          <div class="item-right">
            <div class="item-price">
              <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" fill="#ffaf00"/></svg>
              12500
            </div>
            <div class="lock-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Locked
            </div>
          </div>
        </div>
      </div>

      <!-- Ethereum Galaxy -->
      <div class="store-item d2">
        <div class="store-item-inner">
          <div class="theme-preview" style="background: linear-gradient(135deg, #627eea, #1a0a3a, #9b59b6);"></div>
          <div class="item-icon" style="background:linear-gradient(135deg,#1a0a3a,#0d0620);border:1px solid rgba(98,126,234,0.3);box-shadow:0 4px 14px rgba(98,126,234,0.2);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <polygon points="12,2 20,12 12,16 4,12" fill="#627eea" opacity="0.9"/>
              <polygon points="12,16 20,12 12,22 4,12" fill="#627eea" opacity="0.5"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">Ethereum Galaxy</div>
            <div class="item-sub">Deep space vibes</div>
          </div>
          <div class="item-right">
            <div class="item-price">
              <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" fill="#ffaf00"/></svg>
              17500
            </div>
            <div class="lock-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Locked
            </div>
          </div>
        </div>
      </div>

      <!-- Neon Cyberpunk -->
      <div class="store-item d3">
        <div class="store-item-inner">
          <div class="theme-preview" style="background: linear-gradient(135deg, #00ffb3, #0a0a1a, #ff0090);"></div>
          <div class="item-icon" style="background:linear-gradient(135deg,#001a14,#000d0a);border:1px solid rgba(0,255,179,0.3);box-shadow:0 4px 14px rgba(0,255,179,0.15);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <polygon points="12,2 22,20 2,20" fill="none" stroke="#00ffb3" stroke-width="1.8"/>
              <line x1="12" y1="8" x2="12" y2="14" stroke="#00ffb3" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="17" r="1.5" fill="#00ffb3"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">Neon Cyberpunk</div>
            <div class="item-sub">Dystopian future glow</div>
          </div>
          <div class="item-right">
            <div class="item-price">
              <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" fill="#ffaf00"/></svg>
              20000
            </div>
            <div class="lock-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Locked
            </div>
          </div>
        </div>
      </div>

      <!-- Memecoin Mane -->
      <div class="store-item d4">
        <div class="store-item-inner">
          <div class="theme-preview" style="background: linear-gradient(135deg, #ff6b35, #ffd700, #ff6b35);"></div>
          <div class="item-icon" style="background:linear-gradient(135deg,#2a1a00,#1a0d00);border:1px solid rgba(255,107,53,0.3);box-shadow:0 4px 14px rgba(255,107,53,0.15);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="8" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
              <path d="M8 12 Q12 6 16 12 Q12 18 8 12Z" fill="#ff6b35" opacity="0.7"/>
              <circle cx="12" cy="12" r="2" fill="#ffd700"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">Memecoin Mane</div>
            <div class="item-sub">To the moon aesthetic</div>
          </div>
          <div class="item-right">
            <div class="item-price">
              <svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" fill="#ffaf00"/></svg>
              35000
            </div>
            <div class="lock-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Locked
            </div>
          </div>
        </div>
      </div>

      <!-- NFT Required x3 -->
      <div class="store-item nft-item d5">
        <div class="store-item-inner" style="justify-content:center;padding:16px;">
          <div class="theme-preview" style="background:linear-gradient(135deg,#1a0a3a,#0d0620,#2a1060);"></div>
          <div class="nft-badge">
            <div class="nft-badge-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
              </svg>
              NFT Required
            </div>
          </div>
        </div>
      </div>

      <div class="store-item nft-item d6">
        <div class="store-item-inner" style="justify-content:center;padding:16px;">
          <div class="theme-preview" style="background:linear-gradient(135deg,#003a1a,#001a0d,#006040);"></div>
          <div class="nft-badge">
            <div class="nft-badge-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
              </svg>
              NFT Required
            </div>
          </div>
        </div>
      </div>
